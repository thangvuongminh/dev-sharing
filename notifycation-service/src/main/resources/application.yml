spring:
  application:
    name: notifycation-service
  config:
    import: optional:configserver:http://localhost:6969
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 1000
        max-interval: 2000
      request-read-timeout: 5000
      request-connect-timeout: 5000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8001
server:
  port: 8005