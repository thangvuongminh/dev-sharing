spring:
  application:
    name: content-service
  config:
    import: optional:configserver:http://localhost:6969
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8001
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        max-interval: 1500
        multiplier: 1.2
        initial-interval: 1100
      request-connect-timeout: 5000
      request-read-timeout: 5000
server:
  port: 8003