MINIMUM_WITHDRAWAL_NOT_FULFILL= Số tiền rút không đủ yêu cầu tối thiểu là {0} tín dụng. Vui lòng đảm bảo số tiền rút lớn hơn mức tối thiểu.
WALLET_NOT_FOUND= Ví không tồn tại.
INSUFFICIENT_BALANCE= Số dư của bạn không đủ để hoàn thành giao dịch này.
PENDING_WITHDRAWAL_EXISTS= Bạn có một yêu cầu rút tiền đang chờ xử lý. Vui lòng chờ yêu cầu trước được xử lý xong trước khi thực hiện yêu cầu rút tiền khác.
WITHDRAWAL_NOT_EXIST= Yêu cầu rút tiền với ID {0} không tồn tại
WITHDRAWAL_NOT_AUTHORIZE= Bạn không có quyền xem yêu cầu rút tiền này.
WITHDRAWAL_ALREADY_PROCESSED= Lỗi này xảy ra khi một yêu cầu rút tiền đã được xử lý.
